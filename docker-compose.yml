version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: fluense_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fluense_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
  uploads_data:
